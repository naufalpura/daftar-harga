<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Harga Simpel</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/v/bs4/dt-1.10.18/datatables.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #ffffff;
        font-family: "Inter", sans-serif;
        color: #000;
      }

      /* Search Box: Full Width & Tebal */
      .dataTables_filter {
        width: 100%;
      }
      .dataTables_filter input {
        width: 100% !important;
        margin: 10px 0 20px 0 !important;
        padding: 25px !important;
        border: 4px solid #000 !important; /* Kontras maksimal */
        border-radius: 0 !important;
        font-size: 1.4rem !important;
        font-weight: 900;
        text-transform: uppercase;
      }

      /* Baris List */
      .product-row {
        padding: 12px 10px;
        border-bottom: 2px solid #eeeeee;
        display: flex;
        align-items: center;
        flex-wrap: wrap; /* Agar aman di HP kecil */
        font-size: 1.15rem;
      }

      .prod-name {
        font-weight: 800;
        text-transform: uppercase;
        margin-right: 8px;
      }

      .arrow {
        color: #888;
        margin-right: 8px;
        font-weight: bold;
      }

      .prod-detail {
        color: #0056b3;
        font-weight: 700;
      }

      .prod-isi {
        color: #666;
        background: #f0f0f0;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.9rem;
        margin: 0 8px;
        font-family: "Roboto Mono", monospace;
      }

      .prod-price {
        font-weight: 900;
        color: #d32f2f;
        margin-left: auto; /* Harga rata kanan */
      }

      /* Sembunyikan Tabel Asli */
      #example thead {
        display: none;
      }
      .table td {
        padding: 0;
        border: none !important;
      }
      .dataTables_info {
        font-weight: bold;
        padding: 20px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container-fluid py-4">
      <div class="mb-3">
        <h3 class="font-weight-black text-center">DAFTAR HARGA</h3>
      </div>

      <table id="example" class="table" width="100%">
        <thead>
          <tr>
            <th>Raw</th>
          </tr>
        </thead>
      </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdn.datatables.net/v/bs4/dt-1.10.18/datatables.min.js"></script>

    <script>
      $(document).ready(function () {
        $("#example").DataTable({
          ajax: {
            url: "https://script.google.com/macros/s/AKfycbxMZKsplbUsrvDkP5LLXcLVFSamfHYtmr2lnRqgb6S0-SOtqP0a9M3xu47lXBZrM3Dnpw/exec?action=getData",
            dataSrc: function (json) {
              return json.map((row) => ({
                nama: row[1],
                satuan: row[3],
                isi: row[4],
                harga: row[5],
              }));
            },
          },
          columns: [
            {
              data: null,
              render: function (data) {
                const hargaFmt = new Intl.NumberFormat("id-ID", {
                  style: "decimal",
                  minimumFractionDigits: 0,
                }).format(data.harga);

                return `
                <div class="product-row">
                  <span class="prod-name">${data.nama}</span>
                  <span class="arrow">→</span>
                  <span class="prod-detail">${data.satuan}</span>
                  <span class="prod-isi">(${data.isi})</span>
                  <span class="prod-price">Rp ${hargaFmt}</span>
                </div>`;
              },
            },
          ],
          order: [[0, "asc"]],
          displayLength: 50,
          language: {
            search: "",
            searchPlaceholder: "CARI NAMA PRODUK...",
            info: "Total: _TOTAL_ Barang",
            paginate: { previous: "PREV", next: "NEXT" },
          },
        });
      });
    </script>
  </body>
</html>
